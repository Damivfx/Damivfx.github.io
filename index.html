<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Damivfx - Editor de Videos</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
        :root {
            --color-primary: #00cc44; /* Verde más fuerte */
            --color-secondary: #3498db;
            --color-dark: #1a1a1a;
            --color-gray: #222222;
            --color-light-gray: #333333;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--color-dark);
            color: white;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Custom cursor */
        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid var(--color-primary);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.2s, height 0.2s;
        }
        
        .cursor-dot {
            position: fixed;
            width: 5px;
            height: 5px;
            background-color: var(--color-primary);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
        }
        
        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 20px 0;
            transition: all 0.3s ease;
        }
        
        header.scrolled {
            background-color: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
        
        .gradient-text {
            background: linear-gradient(45deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-menu {
            display: flex;
            list-style: none;
        }
        
        .nav-menu li {
            margin-left: 30px;
        }
        
        .nav-link {
            color: #cccccc; /* Color diferente para los enlaces de navegación */
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-link:hover, .nav-link.active {
            color: var(--color-primary);
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(45deg, var(--color-primary), var(--color-secondary));
            transition: all 0.3s ease;
        }
        
        .nav-link:hover::after, .nav-link.active::after {
            width: 100%;
        }
        
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Social links in header */
        .header-social {
            display: flex;
            gap: 15px;
            margin-left: 30px;
        }
        
        .social-icon {
            color: white;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            text-decoration: none; /* Quitar subrayado */
        }
        
        .social-icon:hover {
            color: var(--color-primary);
            background-color: rgba(0, 204, 68, 0.1);
            transform: translateY(-3px);
        }
        
        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a1a, #333333); /* Fondo degradado */
        }
        
        .geometric-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .geometric-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }
        
        .shape-1 {
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: linear-gradient(45deg, var(--color-primary), transparent);
            animation: float 15s infinite alternate;
        }
        
        .shape-2 {
            bottom: -150px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: linear-gradient(45deg, var(--color-secondary), transparent);
            animation: float 20s infinite alternate-reverse;
        }
        
        .shape-3 {
            top: 40%;
            left: 30%;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, var(--color-primary), var(--color-secondary));
            animation: float 25s infinite alternate;
        }
        
        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(50px, 50px) rotate(10deg);
            }
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
        }
        
        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .hero-subtitle {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #cccccc;
            line-height: 1.6;
        }
        
        .hero-btns {
            display: flex;
            gap: 20px;
        }
        
        .btn-primary {
            display: inline-block;
            background: linear-gradient(45deg, var(--color-primary), var(--color-secondary));
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 204, 68, 0.3);
        }
        
        .btn-secondary {
            display: inline-block;
            background: transparent;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid var(--color-primary);
        }
        
        .btn-secondary:hover {
            background-color: rgba(0, 204, 68, 0.1);
            transform: translateY(-3px);
        }
        
        /* Section */
        .section {
            padding: 100px 0;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }
        
        .section.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 50px;
            text-align: center;
        }
        
        /* Videos Section */
        .videos-container {
            margin-bottom: 60px;
        }
        
        .videos-category {
            margin-bottom: 40px;
        }
        
        .category-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--color-primary);
            display: inline-block;
        }
        
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        
        .video-horizontal-grid {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: minmax(400px, 1fr);
            gap: 30px;
            overflow-x: auto;
            padding-bottom: 20px; 
            scrollbar-width: thin;
            scrollbar-color: var(--color-primary) var(--color-gray);
        }

        .video-horizontal-grid::-webkit-scrollbar {
            height: 8px;
        }

        .video-horizontal-grid::-webkit-scrollbar-track {
            background: var(--color-gray);
            border-radius: 10px;
        }

        .video-horizontal-grid::-webkit-scrollbar-thumb {
            background-color: var(--color-primary);
            border-radius: 10px;
        }
        
        .video-card {
            background-color: var(--color-light-gray);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            flex-shrink: 0; /* Prevent shrinking in flex container */
        }
        
        .video-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }
        
        .video-thumbnail {
            position: relative;
            overflow: hidden;
            padding-top: 177.78%; /* 9:16 aspect ratio for vertical videos */
            background-color: #333;
        }
        
        .video-horizontal-thumbnail {
            position: relative;
            overflow: hidden;
            padding-top: 56.25%; /* 16:9 aspect ratio for horizontal videos */
            background-color: #333;
        }
        
        .video-thumbnail iframe, .video-horizontal-thumbnail iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background-color: rgba(0, 204, 68, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        .video-card:hover .play-button {
            opacity: 1;
        }
        
        .video-info {
            padding: 20px;
        }
        
        .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .video-description {
            color: #cccccc;
            margin-bottom: 15px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .video-meta {
            display: flex;
            justify-content: space-between;
            color: #999;
            font-size: 0.85rem;
        }

    gap: 0;
    align-items: stretch;
    background-color: var(--color-light-gray);
    border-radius: 15px;
    overflow:
